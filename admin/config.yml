backend:
  name: git-gateway
  branch: main

# Editorial workflow is intentionally OFF: CMS saves commit straight to the
# `main` branch (simple mode), so a published edit is on `main` immediately —
# no draft-PR/Publish step to wait on before `git pull` + deploy.
media_folder: images/uploads
public_folder: /images/uploads

collections:

  - name: settings
    label: Site Settings
    files:
      - name: settings
        label: Site Settings
        file: data/settings.json
        fields:
          - { label: Hero Background Image, name: hero_image,  widget: image,  required: false, hint: "Main background image on the homepage. Leave blank to use the default." }
          - { label: Hero Title,            name: hero_title,  widget: text,   required: false, hint: "Use Enter for line breaks. Do NOT include the rotating word (Transport/Mobility/etc) — that is added automatically." }
          - { label: Hero Subtitle,         name: hero_subtitle, widget: text, required: false }
          - { label: Stat — Reports Published,      name: stat_reports,       widget: number }
          - { label: Stat — Countries Engaged,      name: stat_countries,     widget: number }
          - { label: Stat — Practitioners in Network, name: stat_practitioners, widget: number }


  - name: research
    label: Research Papers
    files:
      - name: papers
        label: All Research Papers
        file: data/research.json
        fields:
          - name: papers
            label: Papers
            widget: list
            fields:
              - { label: Title,          name: title,          widget: string }
              - { label: Cover Image,    name: image,          widget: image, required: false, hint: "Optional cover image shown on the research card." }
              - label: Category
                name: category
                widget: select
                options:
                  - { label: Urban & Informal Mobility,    value: urban }
                  - { label: E-Mobility & Decarbonisation, value: emobility }
                  - { label: Road Safety,                  value: safety }
              - { label: Tag (display label), name: tag,          widget: string }
              - { label: Date,           name: date,           widget: date, format: YYYY-MM-DD }
              - { label: Date Display,   name: date_display,   widget: string, hint: "e.g. March 2025" }
              - { label: Summary,        name: summary,        widget: text }
              - { label: PDF / Report URL, name: pdf_url,      widget: string, required: false }
              - { label: Featured (shown prominently), name: featured, widget: boolean, default: false }
              - { label: Featured — Page count,        name: featured_pages,  widget: number, required: false }
              - { label: Featured — Cities studied,    name: featured_cities, widget: number, required: false }

  - name: events
    label: Events
    files:
      - name: events
        label: All Events
        file: data/events.json
        fields:
          - name: upcoming
            label: Upcoming Events
            widget: list
            fields:
              - { label: Title,        name: title,       widget: string }
              - label: Type
                name: type
                widget: select
                options: [Annual Conference, Webinar, Policy Roundtable, Public Lecture, Workshop, Symposium]
              - { label: Date (for sorting), name: date,        widget: date, format: YYYY-MM-DD }
              - { label: End Date (optional, for multi-day events), name: end_date, widget: date, format: YYYY-MM-DD, required: false, hint: "Set for multi-day events so they stay in 'Upcoming' until the last day. Leave blank for single-day events." }
              - { label: Date Display,       name: date_display, widget: string, hint: "e.g. 14–15 June 2025" }
              - { label: Day number,         name: day,          widget: string, hint: "e.g. 14" }
              - { label: Month abbreviation, name: month,        widget: string, hint: "e.g. Jun" }
              - { label: Location,           name: location,     widget: string }
              - { label: Description,        name: description,  widget: text }
              - label: Button Action
                name: registration_action
                widget: select
                options:
                  - { label: 'External link', value: link }
                  - { label: 'Join waiting list (in-page form)', value: waitlist }
                default: link
                required: false
                hint: "Pick 'Join waiting list' to open the email sign-up form instead of linking out."
              - { label: Registration URL,   name: registration_url,   widget: string, required: false }
              - { label: Registration Button Label, name: registration_label, widget: string, required: false }
              - label: Button Style
                name: registration_style
                widget: select
                options: [btn-primary, btn-ghost]
                default: btn-ghost
                required: false
          - name: past
            label: Past Events
            widget: list
            fields:
              - { label: Title,        name: title,        widget: string }
              - { label: Date Display, name: date_display, widget: string, hint: "e.g. March 2025" }
              - { label: Location,     name: location,     widget: string }

  - name: team
    label: Team Members
    files:
      - name: team
        label: All Team Members
        file: data/team.json
        fields:
          - name: members
            label: Members
            widget: list
            fields:
              - { label: Name,               name: name,          widget: string }
              - { label: Initials (2 letters), name: initials,   widget: string }
              - { label: Photo,               name: photo,        widget: image, required: false, hint: "Optional. If left blank, initials are shown instead." }
              - { label: Role / Title,        name: role,         widget: string }
              - { label: Bio,                 name: bio,          widget: text }
              - { label: Twitter URL,         name: twitter_url,  widget: string, required: false }
              - { label: LinkedIn URL,        name: linkedin_url, widget: string, required: false }
              - { label: Profile URL,         name: profile_url,  widget: string, required: false }
              - { label: Profile Link Label,  name: profile_label, widget: string, required: false }
          - name: advisors
            label: Board of Advisors
            label_singular: Advisor
            widget: list
            required: false
            hint: "Shown in a separate 'Board of Advisors' section below the team. Leave empty to hide that section entirely."
            fields:
              - { label: Name,               name: name,          widget: string }
              - { label: Initials (2 letters), name: initials,   widget: string }
              - { label: Photo,               name: photo,        widget: image, required: false, hint: "Optional. If left blank, initials are shown instead." }
              - { label: Role / Affiliation, name: role,         widget: string, hint: "e.g. Professor of Urban Planning · University of Cape Town" }
              - { label: Bio,                 name: bio,          widget: text,   required: false }
              - { label: LinkedIn URL,        name: linkedin_url, widget: string, required: false }
              - { label: Profile URL,         name: profile_url,  widget: string, required: false }
              - { label: Profile Link Label,  name: profile_label, widget: string, required: false }

  - name: news
    label: News & Commentary
    files:
      - name: news
        label: All News
        file: data/news.json
        fields:
          - name: featured
            label: Featured Article
            widget: object
            fields:
              - { label: Title,        name: title,        widget: string }
              - { label: Cover Image,  name: image,        widget: image, required: false, hint: "Optional image shown in the featured news block." }
              - { label: Summary,      name: summary,      widget: text }
              - { label: Date Display, name: date_display, widget: string }
              - { label: Type,         name: type,         widget: string, hint: "e.g. Press Release" }
              - { label: URL,          name: url,          widget: string, required: false }
          - name: items
            label: News Items
            widget: list
            fields:
              - { label: Title,        name: title,        widget: string }
              - { label: Cover Image,  name: image,        widget: image, required: false, hint: "Optional thumbnail image." }
              - { label: Summary,      name: summary,      widget: text }
              - { label: Date Display, name: date_display, widget: string }
              - { label: URL,          name: url,          widget: string, required: false }
